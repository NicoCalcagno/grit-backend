name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Check imports resolve
        env:
          ANTHROPIC_API_KEY: "dummy"
          SPOTIFY_CLIENT_ID: "dummy"
          SPOTIFY_CLIENT_SECRET: "dummy"
          SPOTIFY_REDIRECT_URI: "http://localhost:8000/spotify/callback"
          SUPABASE_URL: "https://dummy.supabase.co"
          SUPABASE_SERVICE_KEY: "dummy"
          JWT_SECRET: "dummy"
          DATABASE_URL: "postgresql+asyncpg://postgres:dummy@localhost:5432/postgres"
        run: python -c "import main"
